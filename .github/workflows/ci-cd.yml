name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # 每天凌晨 2 点运行完整测试
    - cron: '0 2 * * *'

env:
  PYTHON_VERSION: '3.11'
  PIP_CACHE_DIR: ~/.cache/pip

jobs:
  # ========== 代码质量检查 ==========
  quality-check:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: 🎨 Check code formatting (Black)
        run: |
          black tradeflow/ tests/ --check --line-length=120

      - name: 📋 Check imports order (isort)
        run: |
          isort tradeflow/ tests/ --check-only --profile=black

      - name: 🔍 Lint with Flake8
        run: |
          flake8 tradeflow/ tests/ --max-line-length=120 --exclude=__pycache__

      - name: 📝 Type check with Mypy
        run: |
          mypy tradeflow/ --ignore-missing-imports

  # ========== 单元测试 ==========
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality-check

    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
        os: [ubuntu-latest]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: 🧪 Run tests with coverage
        run: |
          pytest tests/ \
            --cov=tradeflow \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing \
            --cov-fail-under=65 \
            -v \
            --tb=short

      - name: 📊 Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: 📁 Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: htmlcov/
          retention-days: 7

  # ========== 集成测试 ==========
  integration-tests:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: unit-tests

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: 🔗 Run integration tests
        run: |
          pytest tests/integration/ \
            -v \
            --tb=short \
            -m integration
        continue-on-error: true

  # ========== 策略回测验证 ==========
  backtest-validation:
    name: 📈 Backtest Validation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: unit-tests

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: 📈 Run strategy backtests
        run: |
          python -m pytest tests/backtest/ \
            -v \
            --tb=short \
            -m backtest
        continue-on-error: true

  # ========== Docker 构建 ==========
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [unit-tests, integration-tests]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build Docker image
        run: |
          docker build \
            -t tradeflow-ai:${{ github.sha }} \
            -t tradeflow-ai:latest \
            .

      - name: 🧪 Test Docker container
        run: |
          docker run --rm tradeflow-ai:${{ github.sha }} python -c "import tradeflow; print('OK')"

      - name: 📤 Push to Docker Hub (only on main branch)
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🚀 Push Docker image
        if: github.ref == 'refs/heads/main'
        run: |
          docker push tradeflow-ai:${{ github.sha }}
          docker push tradeflow-ai:latest

  # ========== 安全扫描 ==========
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: quality-check

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install safety
        run: pip install safety bandit

      - name: 🔒 Check dependencies for vulnerabilities
        run: safety check -r requirements.txt

      - name: 🔍 Run Bandit security lint
        run: bandit -r tradeflow/ -f json -o bandit-report.json || true

      - name: 📁 Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: bandit-report.json
          retention-days: 30

  # ========== 部署准备 ==========
  deploy-ready:
    name: ✅ Deploy Ready
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [quality-check, unit-tests, integration-tests, docker-build, security-scan]

    steps:
      - name: 🎉 All checks passed
        run: |
          echo "✅ All quality gates passed!"
          echo "📦 Ready for deployment"
          echo "🐳 Docker image: tradeflow-ai:${{ github.sha }}"
